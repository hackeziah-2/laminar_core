name: laminar_core_prod

services:
  db:
    image: postgres:15-alpine
    container_name: laminar_db_prod
    env_file:
      - .env.prod
    environment:
      - TZ=UTC
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - laminar_network_prod

  redis:
    image: redis:7-alpine
    container_name: laminar_redis_prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - laminar_network_prod

  backend:
    image: ${APP_IMAGE:-ghcr.io/owner/laminar-core-backend:latest}
    container_name: laminar_backend_prod
    command: gunicorn -k uvicorn.workers.UvicornWorker app.main:app -w ${GUNICORN_WORKERS:-4} -b 0.0.0.0:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      - RUN_MIGRATIONS=1
    volumes:
      - ./backend/uploads:/app/uploads
    ports:
      - "${FASTAPI_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/ready', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - laminar_network_prod

  celery:
    image: ${APP_IMAGE:-ghcr.io/owner/laminar-core-backend:latest}
    container_name: laminar_celery_prod
    command: celery -A app.worker.celery_app worker --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env.prod
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.worker.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 40s
    networks:
      - laminar_network_prod

  celery-beat:
    image: ${APP_IMAGE:-ghcr.io/owner/laminar-core-backend:latest}
    container_name: laminar_celery_beat_prod
    command: celery -A app.worker.celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
      celery:
        condition: service_started
    env_file:
      - .env.prod
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q '[c]elery.*beat'"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - laminar_network_prod

  nginx:
    image: nginx:alpine
    container_name: laminar_nginx_prod
    ports:
      - "8080:80"
    volumes:
      - ./nginx/conf.d/prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - laminar_network_prod

networks:
  laminar_network_prod:
    driver: bridge

volumes:
  pgdata_prod:
