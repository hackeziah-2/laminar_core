name: laminar_core_prod

services:
  redis:
    image: redis:7-alpine
    container_name: laminar_redis_prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - laminar_network_prod

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laminar_backend_prod
    command: gunicorn -k uvicorn.workers.UvicornWorker app.main:app -w 4 -b 0.0.0.0:8000
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      - RUN_MIGRATIONS=1
    volumes:
      - ./backend/uploads:/app/uploads
    ports:
      - "${FASTAPI_PORT:-8000}:8000"
    restart: unless-stopped
    networks:
      - laminar_network_prod

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laminar_celery_prod
    command: celery -A app.worker.celery_app worker --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env.prod
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped
    networks:
      - laminar_network_prod

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laminar_celery_beat_prod
    command: celery -A app.worker.celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
      celery:
        condition: service_started
    env_file:
      - .env.prod
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped
    networks:
      - laminar_network_prod

  nginx:
    image: nginx:alpine
    container_name: laminar_nginx_prod
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/conf.d/prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - laminar_network_prod

networks:
  laminar_network_prod:
    driver: bridge
