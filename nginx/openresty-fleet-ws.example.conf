# OpenResty vhost for fleet.laminaraviationapps.com
#
# fleet serves the frontend and proxies REST /api/v1/ to docker nginx.
# WebSocket upgrades need an explicit location or notifications fail (HTTP 404):
#   wss://fleet.laminaraviationapps.com/api/v1/notifications/ws
#
# Upstream port must match NGINX_PORT in .env.prod (default 8082).
# Deploy: sudo openresty -t && sudo systemctl reload openresty

server {
    listen 443 ssl http2;
    server_name fleet.laminaraviationapps.com;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    # Frontend static app (adjust root/upstream to your setup)
    # location / { ... }

    # WebSocket — more specific than /api/v1/
    location ^~ /api/v1/notifications/ws {
        proxy_pass http://127.0.0.1:8082/api/v1/notifications/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    # Normal REST API (unchanged)
    location /api/v1/ {
        proxy_pass http://127.0.0.1:8082/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
