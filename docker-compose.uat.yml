name: laminar_core_uat

services:
  db:
    image: postgres:15-alpine
    container_name: laminar_db_uat
    env_file:
      - .env.uat
    volumes:
      - pgdata_uat:/var/lib/postgresql/data
      - ./backend/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    # Do not expose DB port for security
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - laminar_network_uat

  redis:
    image: redis:7-alpine
    container_name: laminar_redis_uat
    # Do not expose Redis port
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - laminar_network_uat

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laminar_backend_uat
    command: gunicorn -k uvicorn.workers.UvicornWorker app.main:app -w 4 -b 0.0.0.0:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.uat
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    ports:
      - "${FASTAPI_PORT}:8000" # only expose API
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - laminar_network_uat

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laminar_celery_uat
    command: celery -A app.worker.celery_app worker --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.uat
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    restart: unless-stopped
    networks:
      - laminar_network_uat

  nginx:
    image: nginx:alpine
    container_name: laminar_nginx_uat
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/conf.d/uat.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - laminar_network_uat

volumes:
  pgdata_uat:

networks:
  laminar_network_uat:
    driver: bridge