name: laminar_core_dev

services:
  db:
    image: postgres:15-alpine
    container_name: laminar_db_dev
    env_file:
      - .env.dev
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ./backend/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - laminar_network_dev

  redis:
    image: redis:7-alpine
    container_name: laminar_redis_dev
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - laminar_network_dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laminar_backend_dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.dev
    environment:
      - RUN_MIGRATIONS=1
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    ports:
      - "${FASTAPI_PORT}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - laminar_network_dev

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laminar_celery_dev
    command: celery -A app.worker.celery_app worker --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.dev
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    restart: unless-stopped
    networks:
      - laminar_network_dev

  nginx:
    image: nginx:alpine
    container_name: laminar_nginx_dev
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/conf.d/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - laminar_network_dev

volumes:
  pgdata_dev:

networks:
  laminar_network_dev:
    driver: bridge